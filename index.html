<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Miranda Graham | Digital Learning Portfolio</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      background: #f8f8f5;
      color: #222222;
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.6;
    }

    main {
      width: 100%;
      max-width: 760px;
      padding: 56px 48px;
      background: #ffffff;
      border: 1px solid #dddddd;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.06);
    }

    h1 {
      margin: 0 0 8px;
      color: #111111;
      font-size: 2.5rem;
      line-height: 1.2;
    }

    h2 {
      margin: 0 0 24px;
      color: #444444;
      font-size: 1.35rem;
      font-weight: 500;
    }

    .intro {
      max-width: 620px;
      margin: 0 auto 32px;
      font-size: 1.1rem;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin-bottom: 32px;
    }

    .button {
      display: inline-block;
      padding: 13px 22px;
      border: 2px solid #0055aa;
      border-radius: 7px;
      font-weight: 700;
      text-decoration: none;
      transition: 0.2s ease;
    }

    .button-primary {
      background: #0055aa;
      color: #ffffff;
    }

    .button-secondary {
      background: #ffffff;
      color: #0055aa;
    }

    .button:hover,
    .button:focus {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(0, 85, 170, 0.2);
    }

    .contact {
      margin: 0;
      color: #555555;
      font-size: 0.98rem;
    }

    .contact a {
      color: #0055aa;
    }

    @media (max-width: 600px) {
      main {
        padding: 40px 24px;
      }

      h1 {
        font-size: 2rem;
      }

      .buttons {
        flex-direction: column;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main>
    <h1>Miranda Graham</h1>
    <h2>Digital Learning Portfolio</h2>

    <p class="intro">
      Portfolio of digital learning resources, learner support materials and online learning activities.
    </p>

    <div class="buttons">
      <a
        class="button button-primary"
        href="Miranda%20Graham%20Digital%20Learning%20Portfolio.pdf"
        target="_blank"
        rel="noopener noreferrer"
      >
        View Portfolio (PDF)
      </a>

      <a
        class="button button-secondary"
        href="https://www.linkedin.com/in/mirandaruthgraham/"
        target="_blank"
        rel="noopener noreferrer"
      >
        View LinkedIn
      </a>
    </div>

    <p class="contact">
      Contact:
      <a href="mailto:PASTE-YOUR-EMAIL-HERE">
        mirandagraham.uk@gmail.com
      </a>
    </p>
  </main>
</body>
</html>
